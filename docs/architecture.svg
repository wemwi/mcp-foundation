<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 388" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Karte -->
  <rect x="8" y="8" width="804" height="372" rx="18" fill="#ffffff" stroke="#e6e8eb" stroke-width="1.5"/>

  <!-- Titel + Legende -->
  <text x="34" y="44" font-size="15" font-weight="700" fill="#0f172a">mcp-foundation<tspan font-weight="400" fill="#64748b">  ·  Funktionsweise</tspan></text>
  <circle cx="556" cy="39" r="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="568" y="43" font-size="12" fill="#475569">Foundation</text>
  <circle cx="666" cy="39" r="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="678" y="43" font-size="12" fill="#475569">Dein Server</text>

  <!-- Cloudflare Worker Container -->
  <rect x="210" y="110" width="396" height="190" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="232" y="138" font-size="12" font-weight="600" fill="#64748b">Cloudflare Worker · stateless</text>

  <!-- Client -->
  <rect x="34" y="178" width="134" height="74" rx="13" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="101" y="210" font-size="13.5" font-weight="700" fill="#334155" text-anchor="middle">MCP-Client</text>
  <text x="101" y="229" font-size="11" fill="#64748b" text-anchor="middle">claude.ai</text>

  <!-- OAuth-Gate (Foundation) -->
  <rect x="234" y="160" width="166" height="108" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="317" y="200" font-size="13.5" font-weight="700" fill="#1e3a8a" text-anchor="middle">OAuth-Gate</text>
  <text x="317" y="219" font-size="11.5" fill="#1e40af" text-anchor="middle">+ Transport</text>
  <text x="317" y="240" font-size="10" fill="#3b5bdb" text-anchor="middle">/authorize · /mcp</text>

  <!-- Tools (Consumer) -->
  <rect x="416" y="160" width="166" height="108" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="499" y="200" font-size="13.5" font-weight="700" fill="#14532d" text-anchor="middle">buildServer()</text>
  <text x="499" y="219" font-size="11.5" fill="#166534" text-anchor="middle">→ Tools</text>
  <text x="499" y="240" font-size="10" fill="#16a34a" text-anchor="middle">Allowlist</text>

  <!-- API -->
  <rect x="654" y="178" width="134" height="74" rx="13" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="721" y="210" font-size="13.5" font-weight="700" fill="#334155" text-anchor="middle">Externe API</text>
  <text x="721" y="229" font-size="10.5" fill="#64748b" text-anchor="middle">PSI · Telegram …</text>

  <!-- KV -->
  <rect x="343" y="320" width="130" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="408" y="340" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">OAUTH_KV</text>
  <text x="408" y="356" font-size="9.5" fill="#64748b" text-anchor="middle">State · Tokens</text>

  <!-- Pfeile -->
  <line x1="168" y1="215" x2="230" y2="215" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="199" y="206" font-size="10" fill="#64748b" text-anchor="middle">OAuth 2.1</text>

  <line x1="400" y1="214" x2="414" y2="214" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>

  <line x1="582" y1="215" x2="650" y2="215" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="616" y="206" font-size="10" fill="#64748b" text-anchor="middle">Secret</text>

  <path d="M317,268 L317,300 Q317,320 360,320 L383,320" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="338" y="293" font-size="10" fill="#64748b">State</text>
</svg>
