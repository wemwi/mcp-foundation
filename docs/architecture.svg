<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <g id="lock">
      <rect x="0" y="4.2" width="9" height="6.8" rx="1.4" fill="#f59e0b" stroke="#b45309" stroke-width="0.8"/>
      <path d="M2,4.2 V2.6 A2.5,2.5 0 0,1 7,2.6 V4.2" fill="none" stroke="#b45309" stroke-width="1.2"/>
    </g>
  </defs>

  <!-- Karte -->
  <rect x="8" y="8" width="804" height="344" rx="18" fill="#ffffff" stroke="#e6e8eb" stroke-width="1.5"/>

  <!-- Titel + Legende -->
  <text x="32" y="42" font-size="15" font-weight="700" fill="#0f172a">mcp-foundation<tspan font-weight="400" fill="#64748b">  ·  Funktionsweise</tspan></text>
  <circle cx="474" cy="37" r="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="486" y="41" font-size="12" fill="#475569">Foundation</text>
  <circle cx="586" cy="37" r="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="598" y="41" font-size="12" fill="#475569">Dein Server</text>
  <use href="#lock" x="694" y="31"/>
  <text x="709" y="41" font-size="12" fill="#475569">Anmeldedaten</text>

  <!-- Cloudflare Worker Container -->
  <rect x="234" y="116" width="352" height="108" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="256" y="134" font-size="12" font-weight="600" fill="#64748b">Cloudflare Worker · stateless</text>

  <!-- Clients -->
  <rect x="34" y="140" width="112" height="72" rx="13" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="40" y="148" width="112" height="72" rx="13" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="96" y="180" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">MCP-Clients</text>
  <text x="96" y="197" font-size="9" fill="#64748b" text-anchor="middle">claude.ai · Agent</text>

  <!-- OAuth-Gate (Foundation) -->
  <rect x="256" y="140" width="140" height="72" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="326" y="170" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">OAuth-Gate</text>
  <text x="326" y="187" font-size="11" fill="#1e40af" text-anchor="middle">+ Transport</text>
  <text x="326" y="203" font-size="9.5" fill="#3b5bdb" text-anchor="middle">/authorize · /mcp</text>

  <!-- Tools (Consumer) -->
  <rect x="424" y="140" width="140" height="72" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="494" y="172" font-size="13" font-weight="700" fill="#14532d" text-anchor="middle">buildServer()</text>
  <text x="494" y="190" font-size="11" fill="#166534" text-anchor="middle">→ Tools</text>
  <text x="494" y="205" font-size="9.5" fill="#16a34a" text-anchor="middle">Allowlist</text>

  <!-- API -->
  <rect x="668" y="140" width="112" height="72" rx="13" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="724" y="180" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Externe API</text>
  <text x="724" y="197" font-size="9" fill="#64748b" text-anchor="middle">PSI · Telegram …</text>

  <!-- ===== Flow-Pfeile (y=176) ===== -->
  <!-- Login-Weg: Client → Gate -->
  <line x1="154" y1="176" x2="254" y2="176" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="204" y="167" font-size="10" fill="#64748b" text-anchor="middle">OAuth 2.1</text>

  <!-- intern: Gate → Tools -->
  <line x1="398" y1="176" x2="422" y2="176" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="410" y="167" font-size="8.5" fill="#94a3b8" text-anchor="middle">props</text>

  <!-- API-Weg: Tools → API -->
  <line x1="566" y1="176" x2="666" y2="176" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="616" y="167" font-size="10" fill="#64748b" text-anchor="middle">API-Call</text>

  <!-- ===== Anmeldedaten je Weg (Tropf-Linie → Karte) ===== -->
  <!-- inbound am Login-Weg -->
  <line x1="204" y1="178" x2="204" y2="236" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="138" y="237" width="132" height="22" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <use href="#lock" x="147" y="243"/>
  <text x="161" y="252" font-size="8.2" fill="#92400e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">MCP_AUTH_PASSWORD_HASH</text>
  <text x="204" y="271" font-size="8.5" fill="#64748b" text-anchor="middle">inbound · Login-Prüfung</text>

  <!-- outbound am API-Weg -->
  <line x1="616" y1="178" x2="616" y2="236" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="558" y="237" width="116" height="22" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <use href="#lock" x="566" y="243"/>
  <text x="580" y="252" font-size="8.5" fill="#92400e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">&lt;AUSSTELLER&gt;_&lt;TYP&gt;</text>
  <text x="616" y="271" font-size="8.5" fill="#64748b" text-anchor="middle">outbound · API-Auth</text>

  <!-- ===== State → KV ===== -->
  <rect x="345" y="296" width="130" height="44" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="410" y="316" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">OAUTH_KV</text>
  <text x="410" y="331" font-size="9" fill="#64748b" text-anchor="middle">State · Tokens</text>
  <path d="M326,212 L326,270 Q326,296 360,296 L383,296" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="334" y="288" font-size="9.5" fill="#64748b">State</text>
</svg>
